<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png" href="../../docs/assets/icons/icon_light.png" />
        <link rel="stylesheet" href="../shared/example.css" />
        <title>External Image Upload | GeoScratch Examples</title>
        <style>
            body {
                display: grid;
                grid-template-rows: auto minmax(0, 1fr);
                color: #f4f4f2;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #0b0b0d;
            }

            .proof-header {
                position: relative;
                z-index: 2;
                display: flex;
                min-height: 54px;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
                box-sizing: border-box;
                padding: 10px 18px;
                border-bottom: 1px solid #34343a;
                background: #111114;
            }

            h1,
            .proof-status {
                margin: 0;
                letter-spacing: 0;
            }

            h1 {
                font-size: 16px;
                font-weight: 650;
            }

            .proof-status {
                color: #b7b7bd;
                font-size: 13px;
                font-variant-numeric: tabular-nums;
            }

            body[data-status="passed"] .proof-status {
                color: #69dfab;
            }

            body[data-status="failed"] .proof-status {
                color: #ff8f94;
            }

            .canvas-stage {
                position: relative;
                min-height: 0;
            }

            #GPUFrame {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
            }

            @media (max-width: 520px) {
                .proof-header {
                    min-height: 50px;
                    padding: 8px 12px;
                }

                h1 {
                    font-size: 14px;
                }

                .proof-status {
                    font-size: 12px;
                }
            }
        </style>
    </head>
    <body data-status="pending" data-expected-bytes="" data-actual-bytes="">
        <header class="proof-header">
            <h1>External Image Upload</h1>
            <p id="proof-status" class="proof-status" aria-live="polite">Pending</p>
        </header>
        <main class="canvas-stage">
            <canvas id="GPUFrame"></canvas>
        </main>
        <script type="module" src="./main.js"></script>
    </body>
</html>
