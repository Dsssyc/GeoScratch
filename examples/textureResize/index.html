<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png" href="../../docs/assets/icons/icon_light.png" />
        <link rel="stylesheet" href="../shared/example.css" />
        <title>Texture Resize | GeoScratch Examples</title>
        <style>
            body {
                display: grid;
                grid-template-rows: auto minmax(0, 1fr) auto;
                color: #f4f4f2;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #0b0b0d;
            }

            .proof-header,
            .proof-footer {
                position: relative;
                z-index: 2;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
                box-sizing: border-box;
                border-color: #34343a;
                background: #111114;
            }

            .proof-header {
                min-height: 54px;
                padding: 10px 18px;
                border-bottom-width: 1px;
                border-bottom-style: solid;
            }

            .proof-footer {
                min-height: 38px;
                padding: 8px 18px;
                border-top-width: 1px;
                border-top-style: solid;
            }

            h1,
            .proof-status,
            .proof-facts {
                margin: 0;
                letter-spacing: 0;
            }

            h1 {
                font-size: 16px;
                font-weight: 650;
            }

            .proof-status,
            .proof-facts {
                color: #b7b7bd;
                font-size: 13px;
                font-variant-numeric: tabular-nums;
            }

            body[data-status="passed"] .proof-status {
                color: #69dfab;
            }

            body[data-status="failed"] .proof-status {
                color: #ff8f94;
            }

            .canvas-stage {
                position: relative;
                min-height: 0;
                background: #080b10;
            }

            #GPUFrame {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                image-rendering: pixelated;
            }

            @media (max-width: 520px) {
                .proof-header,
                .proof-footer {
                    gap: 8px;
                    padding-right: 12px;
                    padding-left: 12px;
                }

                .proof-header {
                    min-height: 50px;
                }

                h1 {
                    font-size: 14px;
                }

                .proof-status,
                .proof-facts {
                    font-size: 11px;
                }
            }
        </style>
    </head>
    <body data-status="pending" data-expected-bytes="" data-actual-bytes="">
        <header class="proof-header">
            <h1>Texture Resize</h1>
            <p id="proof-status" class="proof-status" aria-live="polite">Pending</p>
        </header>
        <main class="canvas-stage">
            <canvas id="GPUFrame"></canvas>
        </main>
        <footer class="proof-footer">
            <p id="proof-facts" class="proof-facts">4x3 -> 8x6</p>
        </footer>
        <script type="module" src="./main.ts"></script>
    </body>
</html>
